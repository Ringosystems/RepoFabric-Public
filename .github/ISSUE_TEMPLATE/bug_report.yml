name: 🐛 Bug report
description: Report a bug in RepoFabric
title: "[Bug]: "
labels: ["bug", "triage"]
body:
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: A clear description of the bug.
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. ...
        2. ...
        3. ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: RepoFabric version / commit
    validations:
      required: false
  - type: textarea
    id: env
    attributes:
      label: Environment
      placeholder: OS, runtime versions, deployment topology, etc.
